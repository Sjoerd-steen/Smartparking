<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartParking – Registreren</title>
  <link rel="stylesheet" href="../Styling/main.css"/>
  <link rel="stylesheet" href="../Styling/header.css"/>
  <link rel="stylesheet" href="../login.css"/>
</head>
<body>
 
<div class="bg-shapes">
  <span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span>
</div>
 
<nav>
  <div class="nav-logo">
    <div class="nav-logo-img">SMART PARKING</div>
  </div>
  <div class="nav-actions">
    <a href="login.html" class="nav-icon-btn" title="Login">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      LOGIN
    </a>
    <a href="#" class="nav-icon-btn" title="Home">
      <svg viewBox="0 0 24 24"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg>
    </a>
  </div>
</nav>
 
<div class="page">
  <div class="card">
    <h1 class="card-title">SmartParking</h1>
 
    <div class="field">
      <label for="username">Gebruikersnaam</label>
      <input type="text" id="username" placeholder="gebruikersnaam..."/>
    </div>
 
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="email"/>
    </div>
 
    <div class="field">
      <label for="password">Wachtwoord</label>
      <input type="password" id="password" placeholder="wachtwoord..."/>
    </div>
 
    <div class="field">
      <label for="password_confirm">Wachtwoord bevestigen</label>
      <input type="password" id="password_confirm" placeholder="wachtwoord bevestigen..."/>
    </div>
 
    <button class="btn-primary">Registreren</button>
 
    <p class="card-footer">al een account? <a href="login.html">Naar inlogpagina</a></p>
  </div>
</div>
 
</body>
</html>
